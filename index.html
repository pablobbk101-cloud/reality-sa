<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EchoPoint — Choose Your Side</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --story-bg: #0d0b10;
      --story-accent: #9b6eff;
      --story-gold: #c8a97e;
      --podcast-bg: #1e2128;
      --podcast-ink: #e8e6e0;
      --podcast-accent: #e8875a;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Syne', sans-serif;
    }

    /* ── SPLIT CONTAINER ── */
    .split {
      display: flex;
      width: 100%; height: 100vh;
      position: relative;
    }

    /* ── EACH HALF ── */
    .half {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      transition: flex 0.7s cubic-bezier(0.77, 0, 0.175, 1);
    }

    .half:hover { flex: 1.55; }
    .half:hover .half-cta { opacity: 1; transform: translateY(0); }
    .half:hover .half-label { letter-spacing: 0.22em; }

    /* ── STORIES HALF ── */
    .half--stories {
      background: var(--story-bg);
    }

    /* Particle stars */
    .half--stories::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(200,169,126,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 50%, rgba(200,169,126,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(200,169,126,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 30% 55%, rgba(155,110,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 25%, rgba(255,255,255,0.4) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Glow orb */
    .half--stories::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(155,110,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Candlelight flicker */
    .candle {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .candle-flame {
      width: 14px; height: 22px;
      background: radial-gradient(ellipse at 50% 80%, #fff8e0 0%, #ffcf6b 30%, #ff8c00 65%, transparent 100%);
      border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
      animation: flicker 2.5s ease-in-out infinite;
      filter: blur(0.5px);
      position: relative;
      z-index: 2;
    }
    .candle-body {
      width: 10px; height: 50px;
      background: linear-gradient(to bottom, #e8dcc8, #c8b898);
      border-radius: 2px;
    }
    @keyframes flicker {
      0%, 100% { transform: scaleX(1) scaleY(1) rotate(-1deg); opacity: 1; }
      25% { transform: scaleX(0.85) scaleY(1.08) rotate(1deg); opacity: 0.9; }
      50% { transform: scaleX(1.05) scaleY(0.95) rotate(-0.5deg); opacity: 1; }
      75% { transform: scaleX(0.9) scaleY(1.05) rotate(1.5deg); opacity: 0.95; }
    }

    /* ── PODCAST HALF ── */
    .half--podcast {
      background: #1e2128;
    }

    .half--podcast::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 70%;
      height: 70%;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(232,135,90,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Sound wave lines */
    .podcast-waves {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 5px;
      height: 50px;
    }
    .podcast-waves span {
      display: block;
      width: 3px;
      background: #e8875a;
      border-radius: 2px;
      opacity: 0.35;
      animation: wv 1.6s ease-in-out infinite;
    }
    .podcast-waves span:nth-child(1) { height: 14px; animation-delay: 0s; }
    .podcast-waves span:nth-child(2) { height: 26px; animation-delay: 0.15s; }
    .podcast-waves span:nth-child(3) { height: 40px; animation-delay: 0.3s; }
    .podcast-waves span:nth-child(4) { height: 50px; animation-delay: 0.45s; }
    .podcast-waves span:nth-child(5) { height: 34px; animation-delay: 0.3s; }
    .podcast-waves span:nth-child(6) { height: 22px; animation-delay: 0.15s; }
    .podcast-waves span:nth-child(7) { height: 14px; animation-delay: 0s; }
    @keyframes wv {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    /* ── CENTER DIVIDER ── */
    .divider {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(150,150,150,0.3) 30%, rgba(150,150,150,0.3) 70%, transparent);
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.5s;
    }

    /* ── LOGO CENTER ── */
    .center-logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
    }
    .center-logo-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }
    .center-logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: var(--podcast-ink);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .center-logo-text span { color: var(--podcast-accent); }

    /* ── HALF CONTENT ── */
    .half-content {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 2rem;
    }

    .half-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      opacity: 0.5;
    }

    .half--stories .half-eyebrow { color: var(--story-gold); }
    .half--podcast .half-eyebrow { color: #e8875a; }

    .half-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 6vw, 6rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: 0.08em;
      transition: letter-spacing 0.5s ease;
      margin-bottom: 1rem;
    }

    .half--stories .half-label {
      color: #fff;
      font-style: italic;
    }

    .half--podcast .half-label {
      color: #e8e6e0;
      font-style: normal;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-size: clamp(3rem, 5.5vw, 5.5rem);
    }

    .half-desc {
      font-size: 0.88rem;
      line-height: 1.75;
      max-width: 240px;
      margin: 0 auto 2rem;
      font-weight: 400;
    }
    .half--stories .half-desc { color: rgba(255,255,255,0.45); font-family: 'Cormorant Garamond', serif; font-size: 1rem; }
    .half--podcast .half-desc { color: rgba(232,230,224,0.45); font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.05em; }

    .half-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.7rem 1.6rem;
      border-radius: 2px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease, background 0.2s;
    }

    .half--stories .half-cta {
      background: rgba(155,110,255,0.15);
      color: var(--story-accent);
      border: 1px solid rgba(155,110,255,0.3);
    }
    .half--stories .half-cta:hover { background: rgba(155,110,255,0.25); }

    .half--podcast .half-cta {
      background: #e8875a;
      color: #1e2128;
      border: none;
    }
    .half--podcast .half-cta:hover { background: #e8875a; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .split { flex-direction: column; overflow-y: auto; }
      .half { min-height: 50vh; flex: 1 !important; }
      .divider { display: none; }
      .center-logo { display: none; }
      .half-cta { opacity: 1; transform: none; }
      .half--podcast .half-label { font-size: 3rem; }
      .half--stories .half-label { font-size: 3rem; }
    }
  </style>
</head>
<body>

<div class="split">

  <!-- STORIES HALF -->
  <div class="half half--stories" onclick="window.location='stories/index.html'">
    <div class="half-content">
      <p class="half-eyebrow">Fiction · Audio · Read-Along</p>
      <h2 class="half-label">Stories</h2>
      <p class="half-desc">Fictional tales told in voice and word. Listen as you read, or read as you listen.</p>
      <a href="stories/index.html" class="half-cta">
        Enter Stories
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
    <div class="candle">
      <div class="candle-flame"></div>
      <div class="candle-body"></div>
    </div>
  </div>

  <!-- CENTER LOGO -->
  <div class="divider"></div>
  <div class="center-logo">
    <div class="center-logo-ring">
      <div class="center-logo-text">E<span>P</span></div>
    </div>
  </div>

  <!-- PODCAST HALF -->
  <div class="half half--podcast" onclick="window.location='podcast/index.html'">
    <div class="half-content">
      <p class="half-eyebrow">Random Topics · Deep Dives · Episodes</p>
      <h2 class="half-label">Podcast</h2>
      <p class="half-desc">Any topic. No agenda. Just talking about whatever's interesting.</p>
      <a href="podcast/index.html" class="half-cta">
        Enter Podcast
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
    <div class="podcast-waves">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

</div>

</body>
</html>
